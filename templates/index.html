<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>タスク管理アプリ</title>
</head>
<body>
    <h1>タスク管理アプリ</h1>
    <form method="POST" action="/add">
        <input type="text" name="task" placeholder="新しいタスクを入力" required>
        <input type="date" name="deadline" required>
        <input type="text" name="subject" placeholder="授業名を入力" required>
        <button type="submit">追加</button>
    </form>

<h2>タスク一覧</h2>
<ul>
    {% for task in tasks %}
        <li>{{ task.task }} - 締め切り: {{ task.deadline }} - 授業: {{ task.subject }}</li>
            <form method="POST" action="/delete" style="display:inline;">
                <input type="hidden" name="id" value="{{ task['id'] }}">
                <button type="submit">消去</button>
            </form>
        </li>
    {% else %}
        <li>タスクはまだありません</li>
    {% endfor %}
</ul>

</body>
</html>
